<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVV IFC Profiler</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.30/@arcgis/core/assets/esri/themes/light/main.css" />
    <style>
      html, body, #app { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
      #app { display: grid; grid-template-columns: 1fr 480px; grid-template-rows: 56px 1fr; }
      header { grid-column: 1 / -1; display: flex; align-items: center; padding: 0 16px;
               background: #003a6b; color: white; font-weight: 600; }
      #map { width: 100%; height: 100%; }
      #side { padding: 16px; border-left: 1px solid #ddd; overflow-y: auto; background: #fafafa; }
      #upload { display: block; margin-bottom: 16px; }
      #profile-img { width: 100%; border: 1px solid #ccc; background: white; min-height: 200px; }
      .station { font-variant-numeric: tabular-nums; color: #555; font-size: 13px; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>SVV – Modellbasert prosjektstyring (R700)</header>
      <div id="map"></div>
      <aside id="side">
        <h3>Last opp IFC</h3>
        <input id="upload" type="file" accept=".ifc" />
        <p class="station" id="status">Ingen modell lastet.</p>

        <h3>Tverrprofil</h3>
        <p class="station" id="station-label">Klikk på senterlinjen i kartet for å se profilen.</p>
        <img id="profile-img" alt="Tverrprofil" />
      </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
